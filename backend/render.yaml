services:
  - type: web
    name: vegestore-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vegestore-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        value: rzp_test_yourkeyhere
      - key: RAZORPAY_KEY_SECRET
        value: yoursecrethere

databases:
  - name: vegestore-db
    plan: free
    databaseName: vegestore
    user: vegestore_user
